<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="WearKapde - The screenless future. Smart clothing operating systems.">
    <title>WearKapde | The Future</title>
    
    <!-- FAVICON SETUP -->
    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        ::selection { background: #FF1A1A; color: white; }
        html { scroll-behavior: smooth; }
        
        /* Typography Animation */
        .strike-hover { position: relative; display: inline-block; }
        .strike-hover::after {
            content: '';
            position: absolute; top: 50%; left: 0; width: 100%; height: 6px;
            background: #FF1A1A; transform: scaleX(1); transform-origin: right;
            transition: transform 0.3s ease;
        }
        .strike-hover:hover::after { transform: scaleX(0); transform-origin: left; }
        .strike-hover:hover { opacity: 1; }
        .strike-item { opacity: 0.3; transition: opacity 0.3s; }
    </style>
</head>
<body class="bg-white min-h-screen w-full flex flex-col justify-between selection:bg-red-600 selection:text-white">

    <!-- Navbar -->
    <header class="w-full p-6 md:p-8 flex justify-between items-center fixed top-0 left-0 z-50 bg-white/90 backdrop-blur-sm md:bg-transparent">
        <div class="flex items-center gap-3">
            <!-- 
                UPDATED LOGO LOGIC: 
                If the image fails (404), it hides itself and shows the text instead.
            -->
            <img 
                src="favicon.png" 
                alt="WearKapde Logo" 
                class="h-8 w-8 object-contain"
                onerror="this.style.display='none'; document.getElementById('backup-logo-text').style.display='block';"
            >
            <!-- Text Logo (Hidden by default, appears if image breaks) -->
            <div id="backup-logo-text" class="text-[#FF1A1A] font-bold text-base md:text-lg tracking-tighter uppercase hidden">
                WearKapde
            </div>
            
            <!-- Standard Text Logo (Always Visible if you want text alongside image) -->
            <div class="text-[#FF1A1A] font-bold text-base md:text-lg tracking-tighter uppercase">
                WearKapde
            </div>
        </div>
        <div class="text-[#FF1A1A] text-xs md:text-sm font-medium hidden md:block">
            EST. 2026 / INDIA
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow flex flex-col justify-center items-center px-4 pt-24 pb-20 relative z-10 w-full">
        
        <div class="w-full max-w-7xl text-center space-y-2 flex flex-col items-center">
            
            <!-- HEADLINE -->
            <h1 class="text-[#FF1A1A] font-black tracking-tight leading-[0.9] flex flex-col items-center justify-center w-full select-none">
                <span class="strike-item strike-hover text-6xl sm:text-8xl md:text-9xl lg:text-[11rem] cursor-default mb-2">
                    PHONES
                </span>
                <span class="strike-item strike-hover text-6xl sm:text-8xl md:text-9xl lg:text-[11rem] cursor-default mb-2">
                    COMPUTERS
                </span>
                <span class="text-6xl sm:text-8xl md:text-9xl lg:text-[11rem] mt-2">
                    CLOTHING.
                </span>
            </h1>

            <!-- The Pitch -->
            <p class="text-[#FF1A1A] text-base sm:text-lg md:text-2xl font-bold mt-10 max-w-[90%] md:max-w-2xl mx-auto leading-relaxed">
                The device era is over. <br class="hidden md:block">
                We are weaving the operating system into the fabric of your life.
            </p>

            <!-- EMAIL FORM -->
            <div class="mt-16 w-full flex justify-center">
                <!-- REMEMBER TO PASTE YOUR FORMSPREE LINK BELOW -->
                <form 
                    action="https://formspree.io/f/mykzbpld" 
                    method="POST"
                    class="flex flex-col sm:flex-row border-b-4 border-[#FF1A1A] w-full max-w-[90%] md:max-w-md py-2 group focus-within:max-w-lg transition-all"
                >
                    <input 
                        type="email" 
                        name="email" 
                        placeholder="GET EARLY ACCESS" 
                        class="appearance-none bg-transparent border-none w-full text-[#FF1A1A] mr-3 py-3 px-2 leading-tight focus:outline-none placeholder-red-300/50 font-bold text-lg md:text-xl uppercase text-center sm:text-left"
                        required
                    >
                    <button 
                        class="flex-shrink-0 text-white bg-[#FF1A1A] hover:bg-red-700 text-sm font-bold py-3 px-8 mt-4 sm:mt-0 transition-colors uppercase tracking-wider" 
                        type="submit">
                        Join Waitlist
                    </button>
                </form>
            </div>
            
            <p class="text-red-400 text-[10px] font-bold uppercase tracking-widest mt-6">
                Limited spots for Beta
            </p>
        </div>
    </main>

    <!-- Footer -->
    <footer class="w-full p-6 flex justify-center items-center fixed bottom-0 left-0 bg-white/90 backdrop-blur-sm md:bg-transparent pointer-events-none">
        <p class="text-[#FF1A1A] text-[10px] md:text-xs font-bold uppercase tracking-widest">
            Hardware for Humans
        </p>
    </footer>

</body>
</html>
